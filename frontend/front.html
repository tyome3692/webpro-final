<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャンパスの相棒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#151E2B; --ink-soft:#5A6472; --surface:#EEF1F5; --card:#FFFFFF; --line:#DDE3EA;
    --free:#0E9F5A; --free-bg:#E4F6EC; --accent:#2C3AE0; --accent-soft:#E6E8FD;
    --warn:#C0392B; --warn-bg:#FBEAE8; --amber:#B7791F; --amber-bg:#FBF1DD;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Zen Kaku Gothic New",system-ui,sans-serif;background:var(--surface);color:var(--ink);line-height:1.6;padding:0 0 48px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  header{padding:26px 0 6px}
  .eyebrow{font-size:12px;letter-spacing:.14em;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
  h1{font-size:28px;font-weight:900;letter-spacing:-.01em;line-height:1.15}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin:18px 0 4px;background:#E3E7ED;padding:5px;border-radius:12px}
  .tab{flex:1;border:0;background:transparent;font:inherit;font-size:15px;font-weight:700;color:var(--ink-soft);padding:9px 8px;border-radius:9px;cursor:pointer;transition:.14s}
  .tab[aria-selected="true"]{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .view{display:none;padding-top:16px}
  .view.active{display:block}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .field{margin-bottom:16px}
  .field:last-child{margin-bottom:0}
  .field-label{font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;letter-spacing:.04em}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:999px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:.12s;user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}

  .rail{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .period{flex:0 0 auto;min-width:62px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 6px 8px;text-align:center;cursor:pointer;transition:.12s}
  .period:hover{border-color:var(--accent)}
  .period[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
  .period .n{font-size:17px;font-weight:900;line-height:1}
  .period .t{font-size:10px;color:var(--ink-soft);margin-top:4px}
  .period[aria-pressed="true"] .t{color:#dfe2ff}

  .toggles{display:flex;gap:8px}
  .toggle{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 8px;text-align:center;cursor:pointer;font:inherit;font-size:13px;font-weight:600;transition:.12s}
  .toggle:hover{border-color:var(--accent)}
  .toggle[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:700}
  .toggle .ic{display:block;font-size:18px;margin-bottom:2px}

  .summary{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px 12px}
  .summary .count{font-size:15px;font-weight:700}
  .summary .count b{color:var(--free);font-size:22px}
  .summary .ctx{font-size:12px;color:var(--ink-soft)}

  .list{display:flex;flex-direction:column;gap:10px}

  /* Room card */
  .room{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--free);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px}
  .room .name{font-size:18px;font-weight:900;letter-spacing:-.01em}
  .room .meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .room .tags{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--free-bg);color:var(--free)}
  .tag.cap{background:#EEF1F5;color:var(--ink-soft)}

  /* Assignment card */
  .asg{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--radius);padding:13px 16px;text-decoration:none;color:inherit;display:block;transition:.12s}
  .asg:hover{border-color:var(--accent)}
  .asg.due-soon{border-left-color:var(--warn)}
  .asg.due-week{border-left-color:var(--amber)}
  .asg.done{border-left-color:var(--free);opacity:.72}
  .asg-top{display:flex;align-items:baseline;gap:10px}
  .asg .title{font-size:16px;font-weight:700;letter-spacing:-.01em;flex:1}
  .asg .course{font-size:12px;color:var(--ink-soft);margin-top:3px}
  .asg-bottom{display:flex;align-items:center;gap:8px;margin-top:9px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .badge.sub{background:var(--free-bg);color:var(--free)}
  .badge.graded{background:#EEF1F5;color:var(--ink-soft)}
  .badge.unsub{background:var(--accent-soft);color:var(--accent)}
  .badge.missing{background:var(--warn-bg);color:var(--warn)}
  .countdown{margin-left:auto;font-size:13px;font-weight:700}
  .countdown.soon{color:var(--warn)}
  .countdown.week{color:var(--amber)}
  .countdown.later{color:var(--ink-soft)}
  .asg .date{font-size:12px;color:var(--ink-soft)}

  .state{text-align:center;padding:40px 20px;color:var(--ink-soft);background:var(--card);border:1px dashed var(--line);border-radius:var(--radius)}
  .state .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .state.error{background:var(--warn-bg);border-color:var(--warn);color:var(--warn)}
  .state.error .big{color:var(--warn)}
  .state code{background:#fff;border:1px solid var(--line);padding:1px 6px;border-radius:5px;font-size:12px;color:var(--ink)}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .filterbar{display:flex;gap:8px;margin-bottom:14px}
  footer{margin-top:28px;font-size:12px;color:var(--ink-soft);line-height:1.7}
  footer code{background:#fff;border:1px solid var(--line);padding:1px 5px;border-radius:5px;font-size:11px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}.spinner{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">キャンパスの相棒</div>
    <h1>空き教室と課題を、ひと目で</h1>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" id="tab-rooms" role="tab" aria-selected="true">空き教室</button>
    <button class="tab" id="tab-asg"   role="tab" aria-selected="false">課題</button>
  </div>

  <!-- ============ 空き教室ビュー ============ -->
  <section class="view active" id="view-rooms" role="tabpanel">
    <div class="panel">
      <div class="field"><div class="field-label">キャンパス</div><div class="chips" id="campusChips"></div></div>
      <div class="field"><div class="field-label">曜日</div><div class="chips" id="dayChips"></div></div>
      <div class="field"><div class="field-label">時限</div><div class="rail" id="periodRail"></div></div>
      <div class="field"><div class="field-label">設備でしぼる（任意）</div>
        <div class="toggles">
          <button class="toggle" id="tgPc" aria-pressed="false"><span class="ic">💻</span>PCあり</button>
          <button class="toggle" id="tgFood" aria-pressed="false"><span class="ic">🍙</span>飲食可</button>
        </div>
      </div>
    </div>
    <div class="summary">
      <div class="count"><b id="freeCount">–</b> 室が空いています</div>
      <div class="ctx" id="ctxLabel"></div>
    </div>
    <div class="list" id="rooms"></div>
  </section>

  <!-- ============ 課題ビュー ============ -->
  <section class="view" id="view-asg" role="tabpanel">
    <div class="filterbar">
      <button class="toggle" id="fAll" aria-pressed="true">すべて</button>
      <button class="toggle" id="fUnsub" aria-pressed="false">未提出だけ</button>
    </div>
    <div class="summary">
      <div class="count"><b id="asgCount">–</b> 件の課題</div>
      <div class="ctx" id="asgCtx"></div>
    </div>
    <div class="list" id="assignments"></div>
  </section>

  <footer>
    <p>※ データはバックエンド API（<code id="apiLabel"></code>）から取得しています。サーバーを <code>npm run dev</code> で起動してください。</p>
  </footer>
</div>

<script>
/* ================= 共通 ================= */
const API_BASE = "http://localhost:3000";
document.getElementById("apiLabel").textContent = API_BASE;

/* タブ切り替え（課題は初回表示時に読み込む） */
let asgLoaded = false;
function selectTab(which){
  const rooms = which === "rooms";
  document.getElementById("tab-rooms").setAttribute("aria-selected", rooms);
  document.getElementById("tab-asg").setAttribute("aria-selected", !rooms);
  document.getElementById("view-rooms").classList.toggle("active", rooms);
  document.getElementById("view-asg").classList.toggle("active", !rooms);
  if(!rooms && !asgLoaded){ asgLoaded = true; loadAssignments(); }
}
document.getElementById("tab-rooms").onclick = ()=>selectTab("rooms");
document.getElementById("tab-asg").onclick   = ()=>selectTab("asg");

/* ===================================================================
   空き教室（前回と同じ：条件を送って結果を並べる）
   =================================================================== */
const CAMPUSES=["日吉","三田","矢上"], DAYS=["月","火","水","木","金"];
const PERIODS=[{n:1,t:"9:00"},{n:2,t:"10:45"},{n:3,t:"13:00"},{n:4,t:"14:45"},{n:5,t:"16:30"},{n:6,t:"18:10"}];
const roomState={campus:"日吉",day:0,period:2,needPc:false,needFood:false};
let roomSeq=0;

function makeChips(c,items,cur,pick){c.innerHTML="";items.forEach(({value,label})=>{const b=document.createElement("button");b.className="chip";b.textContent=label;b.setAttribute("aria-pressed",value===cur);b.onclick=()=>pick(value);c.appendChild(b);});}

function renderRoomControls(){
  makeChips(campusChips_(),CAMPUSES.map(c=>({value:c,label:c})),roomState.campus,v=>{roomState.campus=v;refreshRooms();});
  makeChips(dayChips_(),DAYS.map((d,i)=>({value:i,label:d})),roomState.day,v=>{roomState.day=v;refreshRooms();});
  const rail=document.getElementById("periodRail");rail.innerHTML="";
  PERIODS.forEach(p=>{const el=document.createElement("button");el.className="period";el.setAttribute("aria-pressed",p.n===roomState.period);el.innerHTML=`<div class="n">${p.n}</div><div class="t">${p.t}</div>`;el.onclick=()=>{roomState.period=p.n;refreshRooms();};rail.appendChild(el);});
  const pc=document.getElementById("tgPc");pc.setAttribute("aria-pressed",roomState.needPc);pc.onclick=()=>{roomState.needPc=!roomState.needPc;refreshRooms();};
  const fd=document.getElementById("tgFood");fd.setAttribute("aria-pressed",roomState.needFood);fd.onclick=()=>{roomState.needFood=!roomState.needFood;refreshRooms();};
}
const campusChips_=()=>document.getElementById("campusChips");
const dayChips_=()=>document.getElementById("dayChips");

async function fetchFreeRooms(){
  const p=new URLSearchParams({campus:roomState.campus,day:String(roomState.day),period:String(roomState.period)});
  if(roomState.needPc)p.set("has_pc","true");
  if(roomState.needFood)p.set("allows_food","true");
  const r=await fetch(`${API_BASE}/api/classrooms/search?${p}`);
  if(!r.ok)throw new Error(r.status);
  return r.json();
}
function renderRooms(rooms){
  document.getElementById("freeCount").textContent=rooms.length;
  document.getElementById("ctxLabel").textContent=`${roomState.campus}・${DAYS[roomState.day]}曜 ${roomState.period}限`;
  const box=document.getElementById("rooms");box.innerHTML="";
  if(!rooms.length){box.innerHTML=`<div class="state"><div class="big">条件に合う空き教室はありません</div>設備条件をはずすか別の時限を選んでください。</div>`;return;}
  rooms.forEach(r=>{const tags=[];if(r.has_pc)tags.push(`<span class="tag">💻 PC</span>`);if(r.allows_food)tags.push(`<span class="tag">🍙 飲食可</span>`);tags.push(`<span class="tag cap">${r.capacity}席</span>`);const c=document.createElement("div");c.className="room";c.innerHTML=`<div><div class="name">${r.name}</div><div class="meta">${r.campus}キャンパス</div></div><div class="tags">${tags.join("")}</div>`;box.appendChild(c);});
}
async function refreshRooms(){
  renderRoomControls();
  const seq=++roomSeq;
  document.getElementById("freeCount").textContent="–";
  document.getElementById("rooms").innerHTML=`<div class="state"><div class="spinner"></div>空き教室を探しています…</div>`;
  try{const rooms=await fetchFreeRooms();if(seq!==roomSeq)return;renderRooms(rooms);}
  catch(e){if(seq!==roomSeq)return;document.getElementById("freeCount").textContent="–";document.getElementById("rooms").innerHTML=`<div class="state error"><div class="big">サーバーに接続できませんでした</div>バックエンドを <code>npm run dev</code> で起動してください。</div>`;}
}

/* ===================================================================
   課題（Canvas由来。/api/assignments を叩く。トークンは触らない）
   =================================================================== */
let asgData=[], asgFilter="all";

async function fetchAssignments(){
  const r=await fetch(`${API_BASE}/api/assignments`);
  if(!r.ok) throw new Error(r.status);
  return r.json(); // [{id,title,course,due_at,status,html_url}]
}

/* 締め切りまでの日数と、表示の見た目を決める */
function dueInfo(due_at){
  const now=new Date(), due=new Date(due_at);
  const days=Math.ceil((due-now)/86400000);
  let label, cls;
  if(days<0){ label="期限切れ"; cls="soon"; }
  else if(days===0){ label="今日まで"; cls="soon"; }
  else if(days===1){ label="あと1日"; cls="soon"; }
  else if(days<=3){ label=`あと${days}日`; cls="soon"; }
  else if(days<=7){ label=`あと${days}日`; cls="week"; }
  else { label=`あと${days}日`; cls="later"; }
  return {days,label,cls};
}
const fmtDate=(iso)=>new Intl.DateTimeFormat("ja-JP",{month:"numeric",day:"numeric",weekday:"short",hour:"2-digit",minute:"2-digit"}).format(new Date(iso));

function statusBadge(status){
  switch(status){
    case "graded":  return `<span class="badge graded">採点済み</span>`;
    case "submitted": return `<span class="badge sub">提出済み</span>`;
    case "missing": return `<span class="badge missing">未提出・期限切れ</span>`;
    default:        return `<span class="badge unsub">未提出</span>`;
  }
}
const isDone=(s)=> s==="submitted"||s==="graded";

function renderAssignments(){
  const box=document.getElementById("assignments");
  let items=asgData.slice().sort((a,b)=>new Date(a.due_at)-new Date(b.due_at));
  if(asgFilter==="unsub") items=items.filter(a=>!isDone(a.status));

  document.getElementById("asgCount").textContent=items.length;
  const remaining=asgData.filter(a=>!isDone(a.status)).length;
  document.getElementById("asgCtx").textContent=`未提出 ${remaining} 件`;

  box.innerHTML="";
  if(!items.length){box.innerHTML=`<div class="state"><div class="big">表示する課題がありません</div>${asgFilter==="unsub"?"未提出の課題はありません。おつかれさま。":"締め切りのある課題が見つかりませんでした。"}</div>`;return;}

  items.forEach(a=>{
    const done=isDone(a.status);
    const di=dueInfo(a.due_at);
    const cls = done ? "done" : (di.cls==="soon"?"due-soon":di.cls==="week"?"due-week":"");
    const el=document.createElement("a");
    el.className=`asg ${cls}`;
    el.href=a.html_url||"#";
    el.target="_blank"; el.rel="noopener";
    el.innerHTML=`
      <div class="asg-top">
        <div class="title">${a.title}</div>
        ${done?"":`<div class="countdown ${di.cls}">${di.label}</div>`}
      </div>
      <div class="course">${a.course}</div>
      <div class="asg-bottom">
        ${statusBadge(a.status)}
        <span class="date">${fmtDate(a.due_at)}</span>
      </div>`;
    box.appendChild(el);
  });
}

async function loadAssignments(){
  document.getElementById("asgCount").textContent="–";
  document.getElementById("assignments").innerHTML=`<div class="state"><div class="spinner"></div>Canvasから課題を取得しています…</div>`;
  try{ asgData=await fetchAssignments(); renderAssignments(); }
  catch(e){
    document.getElementById("asgCount").textContent="–";
    document.getElementById("assignments").innerHTML=`<div class="state error">
      <div class="big">課題を取得できませんでした</div>
      バックエンドが起動しているか、<code>.env</code> の Canvas トークンが有効かを確認してください。
    </div>`;
  }
}
document.getElementById("fAll").onclick  =()=>{asgFilter="all"; document.getElementById("fAll").setAttribute("aria-pressed",true); document.getElementById("fUnsub").setAttribute("aria-pressed",false); renderAssignments();};
document.getElementById("fUnsub").onclick=()=>{asgFilter="unsub"; document.getElementById("fUnsub").setAttribute("aria-pressed",true); document.getElementById("fAll").setAttribute("aria-pressed",false); renderAssignments();};

/* 起動 */
refreshRooms();
</script>
</body>
</html>
